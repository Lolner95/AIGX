<svg width="640" height="200" viewBox="0 0 640 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AIGX — AI Genome Exchange">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="38%" stop-color="#3b82f6"/>
      <stop offset="70%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="strand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- DNA double helix made of code-bracket nodes -->
  <g transform="translate(40,28)" stroke-linecap="round">
    <!-- two sine strands -->
    <path d="M16 6 C 64 40, 64 104, 16 138 C -32 172, -32 236, 16 270" fill="none" stroke="url(#strand)" stroke-width="5" opacity="0.9" transform="scale(1,0.5)"/>
    <path d="M88 6 C 40 40, 40 104, 88 138 C 136 172, 136 236, 88 270" fill="none" stroke="url(#strand)" stroke-width="5" opacity="0.55" transform="scale(1,0.5)"/>
    <!-- base-pair rungs rendered as { } code braces -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700" fill="url(#g)">
      <text x="26" y="14">{ }</text>
      <text x="40" y="38">{ }</text>
      <text x="40" y="62">{ }</text>
      <text x="26" y="86">{ }</text>
      <text x="40" y="110">{ }</text>
    </g>
    <!-- nodes -->
    <g fill="#22c55e">
      <circle cx="16" cy="3" r="3.5"/><circle cx="44" cy="3" r="3.5"/>
      <circle cx="44" cy="69" r="3.5"/><circle cx="16" cy="69" r="3.5"/>
      <circle cx="44" cy="135" r="3.5" fill="#f59e0b"/><circle cx="16" cy="135" r="3.5" fill="#f59e0b"/>
    </g>
  </g>

  <!-- wordmark -->
  <g transform="translate(170,0)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
    <text x="0" y="98" font-size="76" font-weight="800" letter-spacing="-2" fill="url(#g)">AIGX</text>
    <text x="3" y="132" font-size="22" font-weight="600" fill="#64748b">AI&#160;Genome&#160;Exchange</text>
    <text x="4" y="162" font-size="14.5" font-weight="500" fill="#94a3b8">The benchmark-validated context format for AI coding agents</text>
  </g>
</svg>
